# Sherman QC Helm Chart Values
# Default values for sherman-qc deployment

# Global configuration
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# Namespace configuration
namespace: sherman-qc

# Backend API configuration
backend:
  replicaCount: 2

  image:
    repository: sherman-qc/backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  env:
    LOG_LEVEL: "INFO"
    WORKERS: "4"

  # Liveness and readiness probes
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3

# Frontend configuration
frontend:
  replicaCount: 2

  image:
    repository: sherman-qc/frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

# Worker configuration (for async tasks)
worker:
  enabled: true
  replicaCount: 2

  image:
    repository: sherman-qc/worker
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  hosts:
    - host: qc.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: sherman-qc-tls
      hosts:
        - qc.example.com

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: ""  # Set in secrets
    username: shermanqc
    password: ""  # Set in secrets
    database: shermanqc
  primary:
    persistence:
      enabled: true
      size: 50Gi
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 1Gi
  readReplicas:
    replicaCount: 1
    persistence:
      enabled: true
      size: 50Gi

# External PostgreSQL (if not using built-in)
externalPostgresql:
  enabled: false
  host: ""
  port: 5432
  database: shermanqc
  username: shermanqc
  existingSecret: ""
  existingSecretPasswordKey: password

# Redis configuration
redis:
  enabled: true
  auth:
    enabled: true
    password: ""  # Set in secrets
  master:
    persistence:
      enabled: true
      size: 10Gi
  replica:
    replicaCount: 1

# External Redis (if not using built-in)
externalRedis:
  enabled: false
  host: ""
  port: 6379
  existingSecret: ""
  existingSecretPasswordKey: password

# Storage configuration
storage:
  # Persistent volume for scan files
  scans:
    enabled: true
    size: 100Gi
    storageClass: ""  # Use default if empty
    accessModes:
      - ReadWriteMany

  # Persistent volume for generated reports
  reports:
    enabled: true
    size: 50Gi
    storageClass: ""
    accessModes:
      - ReadWriteMany

# AI Provider configuration
ai:
  provider: claude  # claude, gemini, openai
  model: ""  # Leave empty for default

  # API key secrets
  anthropicApiKeySecret:
    name: ai-secrets
    key: anthropic-api-key

  googleApiKeySecret:
    name: ai-secrets
    key: google-api-key

  openaiApiKeySecret:
    name: ai-secrets
    key: openai-api-key

# JWT Authentication
auth:
  jwtSecret:
    name: auth-secrets
    key: jwt-secret
  tokenExpireMinutes: 30
  refreshExpireMinutes: 10080  # 7 days

# Service accounts
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network policies
networkPolicy:
  enabled: false
  ingress:
    enabled: true
    allowExternal: true
  egress:
    enabled: false

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    labels: {}

  # Prometheus rules
  prometheusRules:
    enabled: true
    rules:
      - alert: ShermanQCHighErrorRate
        expr: |
          sum(rate(http_requests_total{service="sherman-qc",status=~"5.."}[5m])) /
          sum(rate(http_requests_total{service="sherman-qc"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"

      - alert: ShermanQCHighLatency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service="sherman-qc"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"

# Node selector, tolerations, and affinity
nodeSelector: {}
tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - sherman-qc
          topologyKey: kubernetes.io/hostname

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Extra environment variables
extraEnv: []

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []
