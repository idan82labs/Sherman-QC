{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sherman-qc.fullname" . }}-backend
  labels:
    {{- include "sherman-qc.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sherman-qc.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  ingress:
    {{- if .Values.networkPolicy.ingress.enabled }}
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
    # Allow traffic from frontend pods
    - from:
        - podSelector:
            matchLabels:
              {{- include "sherman-qc.frontend.selectorLabels" . | nindent 14 }}
      ports:
        - port: 8000
          protocol: TCP
    # Allow traffic from worker pods
    {{- if .Values.worker.enabled }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "sherman-qc.worker.selectorLabels" . | nindent 14 }}
    {{- end }}
    {{- if .Values.networkPolicy.ingress.allowExternal }}
    # Allow all external traffic (when enabled)
    - {}
    {{- end }}
    {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - port: 5432
          protocol: TCP
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: 6379
          protocol: TCP
    # Allow HTTPS (for AI API calls)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
  {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sherman-qc.fullname" . }}-frontend
  labels:
    {{- include "sherman-qc.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sherman-qc.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  ingress:
    {{- if .Values.networkPolicy.ingress.enabled }}
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 80
          protocol: TCP
    {{- if .Values.networkPolicy.ingress.allowExternal }}
    - {}
    {{- end }}
    {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    # Allow traffic to backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "sherman-qc.backend.selectorLabels" . | nindent 14 }}
      ports:
        - port: 8000
          protocol: TCP
  {{- end }}
{{- end }}
