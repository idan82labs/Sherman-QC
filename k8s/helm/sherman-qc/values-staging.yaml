# Sherman QC - Staging Environment Values
# Usage: helm install sherman-qc ./k8s/helm/sherman-qc -f ./k8s/helm/sherman-qc/values-staging.yaml

namespace: sherman-qc-staging

backend:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  env:
    LOG_LEVEL: "INFO"
    WORKERS: "2"

frontend:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3

worker:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  hosts:
    - host: qc-staging.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: sherman-qc-staging-tls
      hosts:
        - qc-staging.example.com

postgresql:
  enabled: true
  auth:
    password: ""  # Set via --set or external secret
    database: shermanqc_staging
  primary:
    persistence:
      size: 20Gi
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 512Mi
  readReplicas:
    replicaCount: 1
    persistence:
      size: 20Gi

redis:
  enabled: true
  auth:
    password: ""  # Set via --set or external secret
  master:
    persistence:
      size: 5Gi
  replica:
    replicaCount: 0

storage:
  scans:
    size: 50Gi
  reports:
    size: 20Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false  # Enable after testing

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
